services:
  ai-video-transcriber:
    build: .
    ports:
      - "8000:8000"
    # volumes:
      # 挂载临时文件目录，便于查看和管理下载的文件
      # - ./temp:/app/temp
    restart: unless-stopped

    # 资源限制（可选）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
