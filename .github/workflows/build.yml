name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 前端：TypeScript 检查 + 生产构建
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install
        working-directory: frontend

      - run: pnpm lint
        working-directory: frontend

      - run: pnpm build
        working-directory: frontend

      # 上传构建产物（后续 job 可复用 + 供手动下载）
      - uses: actions/upload-artifact@v4
        with:
          name: static-build
          path: static/

  # ──────────────────────────────────────────────
  # macOS 桌面应用打包（仅 tag 推送时触发）
  # ──────────────────────────────────────────────
  macos-package:
    name: macOS .app Package (arm64)
    runs-on: macos-15
    needs: frontend
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # 下载前端构建产物（避免重复构建）
      - uses: actions/download-artifact@v4
        with:
          name: static-build
          path: static/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller pywebview certifi

      - name: Install system deps
        run: |
          brew install ffmpeg librsvg

      - name: Build desktop app
        run: bash scripts/build_macos.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-transcriber-macos-arm64
          path: dist/*.zip

  # ──────────────────────────────────────────────
  # Docker 镜像构建（仅 tag 推送时触发）
  # ──────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: frontend
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      # 用已构建的静态文件覆盖（确保与 frontend job 一致）
      - uses: actions/download-artifact@v4
        with:
          name: static-build
          path: static/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
